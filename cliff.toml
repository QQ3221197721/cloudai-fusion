# ============================================================================
# git-cliff — Changelog generator configuration
# https://git-cliff.org/docs/configuration
#
# Usage:
#   git cliff --config cliff.toml --output CHANGELOG.md
#   git cliff --config cliff.toml --unreleased --tag v0.3.0
# ============================================================================

[changelog]
header = """
# Changelog

All notable changes to CloudAI Fusion will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

"""
body = """
{%- macro remote_url() -%}
  https://github.com/cloudai-fusion/cloudai-fusion
{%- endmacro -%}

{% if version -%}
## [{{ version | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
## [Unreleased]
{% endif -%}

{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits
| filter(attribute="scope")
| sort(attribute="scope") %}
- **{{ commit.scope }}**: {{ commit.message }}
  {%- if commit.breaking %} (**BREAKING**){% endif %}
  {%- if commit.body %}\n  {{ commit.body | indent(width=2) }}{% endif %}
  ([{{ commit.id | truncate(length=7, end="") }}]({{ self::remote_url() }}/commit/{{ commit.id }}))
{%- endfor -%}
{% for commit in commits %}
{%- if not commit.scope %}
- {{ commit.message }}
  {%- if commit.breaking %} (**BREAKING**){% endif %}
  ([{{ commit.id | truncate(length=7, end="") }}]({{ self::remote_url() }}/commit/{{ commit.id }}))
{%- endif -%}
{%- endfor -%}
{% endfor %}
"""
footer = """
---
*Generated by [git-cliff](https://git-cliff.org/)*
"""
trim = true
postprocessors = [
  { pattern = '<REPO>', replace = "https://github.com/cloudai-fusion/cloudai-fusion" },
]

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false

commit_preprocessors = [
  # Remove issue numbers from commit messages
  { pattern = '\((\w+\s)?#([0-9]+)\)', replace = "" },
  # Replace GitHub usernames
  { pattern = '@([a-zA-Z0-9_-]+)', replace = "[@${1}](https://github.com/${1})" },
]

commit_parsers = [
  { message = "^feat",     group = "Features" },
  { message = "^fix",      group = "Bug Fixes" },
  { message = "^perf",     group = "Performance" },
  { message = "^refactor", group = "Refactor" },
  { message = "^doc",      group = "Documentation" },
  { message = "^style",    group = "Styling", skip = true },
  { message = "^test",     group = "Testing" },
  { message = "^ci",       group = "CI/CD" },
  { message = "^build",    group = "Build System" },
  { message = "^chore\\(release\\)", skip = true },
  { message = "^chore\\(deps\\)",    group = "Dependencies" },
  { message = "^chore\\(pr\\)",      skip = true },
  { message = "^chore\\(pull\\)",    skip = true },
  { message = "^chore",    group = "Miscellaneous", skip = true },
  { message = "^revert",   group = "Reverts" },
  { body = ".*security",   group = "Security" },
]

protect_breaking_commits = false
filter_commits = false
tag_pattern = "v[0-9].*"
skip_tags = ""
ignore_tags = ""
topo_order = false
sort_commits = "newest"

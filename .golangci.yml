# ============================================================================
# golangci-lint v2 configuration for CloudAI Fusion
# Run: golangci-lint run ./...
# Docs: https://golangci-lint.run/docs/configuration/file/
# ============================================================================
# 策略: 先用核心 linter 保证 CI 通过，后续逐步启用更多检查
# ============================================================================

version: "2"

linters:
  # 仅启用 go vet 已验证通过的核心检查，避免存量代码大量报错
  enable:
    - govet           # Go 内置静态分析 (已通过 go vet ./...)
    - staticcheck     # 静态分析 (含 gosimple)
    - ineffassign     # 无效赋值检测
    - unused          # 未使用代码检测

  settings:
    staticcheck:
      checks:
        - all
        - "-SA1019"   # 忽略 deprecated 警告（存量代码较多）
        - "-SA9003"   # 忽略空分支
        - "-ST1000"   # 忽略包注释格式
        - "-ST1003"   # 忽略命名风格
        - "-ST1016"   # 忽略方法接收者命名
        - "-ST1020"   # 忽略导出函数注释
        - "-ST1021"   # 忽略导出类型注释
        - "-ST1022"   # 忽略导出变量注释
        - "-QF1012"   # 忽略 fmt.Errorf 简化建议

  exclusions:
    rules:
      # 测试文件宽松处理
      - path: _test\.go
        linters: [errcheck, unused]
      # Mock / 生成文件
      - path: mock_
        linters: [unused]
      # 示例目录
      - path: examples/
        linters: [errcheck]

# 格式化器 (v2: 与 linter 分离)
formatters:
  enable:
    - gofmt
    - goimports

# 输出限制
issues:
  max-issues-per-linter: 50
  max-same-issues: 3

# ============================================================================
# golangci-lint v2 configuration for CloudAI Fusion
# Run: golangci-lint run ./...
# Docs: https://golangci-lint.run/docs/configuration/file/
# ============================================================================

version: "2"

linters:
  enable:
    # Default linters (gosimple merged into staticcheck in v2)
    - errcheck        # Check for unchecked errors
    - govet           # Vet examines Go source code
    - ineffassign     # Detect ineffectual assignments
    - staticcheck     # Static analysis checks (includes gosimple)
    - unused          # Check for unused code

    # Additional linters
    - bodyclose       # Check HTTP response body is closed
    - copyloopvar     # Detect loop variable capture issues
    - dupl            # Code clone detection
    - durationcheck   # Check for two durations multiplied together
    - errname         # Check error naming conventions
    - errorlint       # Wrapping errors with fmt.Errorf
    - exhaustive      # Check exhaustive switch statements
    - gocognit        # Cognitive complexity
    - goconst         # Find repeated strings that could be constants
    - gocritic        # Opinionated Go source code linter
    - gocyclo         # Cyclomatic complexity
    - gosec           # Security checks
    - misspell        # Find misspelled English words
    - nakedret        # Find naked returns in long functions
    - nilerr          # Find code that returns nil even if error is not nil
    - noctx           # Find HTTP requests without context.Context
    - prealloc        # Find slice declarations that could be preallocated
    - predeclared     # Find shadowed predeclared identifiers
    - revive          # Extensible linter (successor of golint)
    - unconvert       # Remove unnecessary type conversions
    - unparam         # Find unused function parameters
    - wastedassign    # Find wasted assignment statements

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: false

    gocyclo:
      min-complexity: 25

    gocognit:
      min-complexity: 40

    dupl:
      threshold: 200

    goconst:
      min-len: 3
      min-occurrences: 4

    gocritic:
      enabled-tags:
        - diagnostic
        - performance
      disabled-checks:
        - ifElseChain
        - hugeParam

    gosec:
      excludes:
        - G404  # Insecure random number source (math/rand) — acceptable for non-security use

    nakedret:
      max-func-lines: 30

    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: exported
          disabled: true
        - name: increment-decrement
        - name: indent-error-flow
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: var-declaration
        - name: var-naming

    exhaustive:
      default-signifies-exhaustive: true

    misspell:
      locale: US

  exclusions:
    rules:
      # Test files can have longer functions and more complexity
      - path: _test\.go
        linters:
          - dupl
          - gocyclo
          - gocognit
          - errcheck
          - gosec
          - unparam
          - goconst

      # Generated / mock files
      - path: mock_
        linters:
          - dupl
          - unused
          - unparam

      # Main entry points
      - path: cmd/
        linters:
          - gocyclo

      # Examples directory
      - path: examples/
        linters:
          - errcheck

# Formatters (v2: separated from linters)
formatters:
  enable:
    - gofmt
    - goimports

# Issues configuration (v2: separate top-level section)
issues:
  max-issues-per-linter: 50
  max-same-issues: 5

severity:
  default: warning
  rules:
    - linters:
        - govet
        - errcheck
        - staticcheck
      severity: error

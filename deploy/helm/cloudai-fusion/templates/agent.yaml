{{- /*
  Agent DaemonSet - runs on every node for GPU/resource telemetry collection
*/}}
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "cloudai-fusion.fullname" . }}-agent
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cloudai-fusion.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "cloudai-fusion.name" . }}
      app.kubernetes.io/component: agent
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "cloudai-fusion.name" . }}
        app.kubernetes.io/component: agent
    spec:
      serviceAccountName: {{ include "cloudai-fusion.fullname" . }}-agent
      hostPID: true
      tolerations:
        - operator: Exists
      containers:
        - name: agent
          image: "{{ .Values.agent.image.repository }}:{{ .Values.agent.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.agent.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: http
              containerPort: 8082
            - name: metrics
              containerPort: 9092
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: APISERVER_ADDR
              value: "http://{{ include "cloudai-fusion.fullname" . }}-apiserver:8080"
          securityContext:
            privileged: true
          volumeMounts:
            - name: dev
              mountPath: /dev
            - name: sys
              mountPath: /sys
              readOnly: true
            - name: proc
              mountPath: /host/proc
              readOnly: true
          resources:
            {{- toYaml .Values.agent.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: dev
          hostPath:
            path: /dev
        - name: sys
          hostPath:
            path: /sys
        - name: proc
          hostPath:
            path: /proc

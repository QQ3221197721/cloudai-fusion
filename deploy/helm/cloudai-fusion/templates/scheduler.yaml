{{- /*
  Scheduler Deployment - GPU topology-aware AI resource scheduler
*/}}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cloudai-fusion.fullname" . }}-scheduler
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cloudai-fusion.labels" . | nindent 4 }}
    app.kubernetes.io/component: scheduler
spec:
  replicas: {{ .Values.scheduler.replicas | default 2 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "cloudai-fusion.name" . }}
      app.kubernetes.io/component: scheduler
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "cloudai-fusion.name" . }}
        app.kubernetes.io/component: scheduler
    spec:
      serviceAccountName: {{ include "cloudai-fusion.fullname" . }}-scheduler
      containers:
        - name: scheduler
          image: "{{ .Values.scheduler.image.repository }}:{{ .Values.scheduler.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.scheduler.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: http
              containerPort: 8081
            - name: metrics
              containerPort: 9091
          env:
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ include "cloudai-fusion.fullname" . }}-secrets
                  key: db-host
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "cloudai-fusion.fullname" . }}-secrets
                  key: db-password
            - name: REDIS_ADDR
              value: "{{ .Values.redis.host }}:{{ .Values.redis.port }}"
            - name: KAFKA_BROKERS
              value: "{{ .Values.kafka.brokers }}"
          resources:
            {{- toYaml .Values.scheduler.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cloudai-fusion.fullname" . }}-scheduler
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cloudai-fusion.labels" . | nindent 4 }}
    app.kubernetes.io/component: scheduler
spec:
  type: ClusterIP
  ports:
    - port: 8081
      targetPort: http
      protocol: TCP
      name: http
    - port: 9091
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    app.kubernetes.io/name: {{ include "cloudai-fusion.name" . }}
    app.kubernetes.io/component: scheduler

{{- /*
  Observability Controller — alert routing, on-call management,
  runbook automation, and incident retrospective.
*/}}
{{- if .Values.observability.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cloudai-fusion.fullname" . }}-observability-controller
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cloudai-fusion.labels" . | nindent 4 }}
    app.kubernetes.io/component: observability-controller
spec:
  replicas: {{ .Values.observability.replicaCount | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "cloudai-fusion.name" . }}
      app.kubernetes.io/component: observability-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "cloudai-fusion.name" . }}
        app.kubernetes.io/component: observability-controller
    spec:
      serviceAccountName: {{ include "cloudai-fusion.fullname" . }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      containers:
        - name: observability-controller
          image: "{{ .Values.observability.image.repository }}:{{ .Values.observability.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.observability.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: http
              containerPort: 8087
            - name: metrics
              containerPort: 9107
          env:
            - name: ALERTMANAGER_URL
              value: {{ .Values.observability.alertmanagerURL | default "http://alertmanager:9093" | quote }}
            - name: PAGERDUTY_INTEGRATION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "cloudai-fusion.fullname" . }}-observability-secrets
                  key: pagerduty-integration-key
                  optional: true
            - name: SLACK_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "cloudai-fusion.fullname" . }}-observability-secrets
                  key: slack-webhook-url
                  optional: true
            - name: APISERVER_ADDR
              value: "http://{{ include "cloudai-fusion.fullname" . }}-apiserver:8080"
            - name: DB_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ include "cloudai-fusion.fullname" . }}-secrets
                  key: database-url
          resources:
            {{- toYaml .Values.observability.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cloudai-fusion.fullname" . }}-observability-controller
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cloudai-fusion.labels" . | nindent 4 }}
    app.kubernetes.io/component: observability-controller
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8087
      targetPort: http
    - name: metrics
      port: 9107
      targetPort: metrics
  selector:
    app.kubernetes.io/name: {{ include "cloudai-fusion.name" . }}
    app.kubernetes.io/component: observability-controller
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cloudai-fusion.fullname" . }}-observability-secrets
  namespace: {{ .Release.Namespace }}
type: Opaque
data:
  {{- if .Values.observability.pagerdutyIntegrationKey }}
  pagerduty-integration-key: {{ .Values.observability.pagerdutyIntegrationKey | b64enc | quote }}
  {{- else }}
  pagerduty-integration-key: ""
  {{- end }}
  {{- if .Values.observability.slackWebhookURL }}
  slack-webhook-url: {{ .Values.observability.slackWebhookURL | b64enc | quote }}
  {{- else }}
  slack-webhook-url: ""
  {{- end }}
{{- end }}

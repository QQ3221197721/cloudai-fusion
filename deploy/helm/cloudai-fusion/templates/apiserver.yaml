{{- /*
  API Server — Core REST/gRPC gateway for CloudAI Fusion
*/}}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cloudai-fusion.fullname" . }}-apiserver
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cloudai-fusion.labels" . | nindent 4 }}
    app.kubernetes.io/component: apiserver
spec:
  {{- if not .Values.apiserver.autoscaling.enabled }}
  replicas: {{ .Values.apiserver.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "cloudai-fusion.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: apiserver
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "cloudai-fusion.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: apiserver
      annotations:
        {{- include "cloudai-fusion.prometheusAnnotations" (dict "port" (toString .Values.apiserver.service.metricsPort)) | nindent 8 }}
        {{- include "cloudai-fusion.checksumAnnotation" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "cloudai-fusion.serviceAccountName" (dict "context" . "component" "apiserver") }}
      securityContext:
        {{- include "cloudai-fusion.podSecurityContext" . | nindent 8 }}
      topologySpreadConstraints:
        {{- include "cloudai-fusion.topologySpreadConstraints" (dict "component" "apiserver") | nindent 8 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: apiserver
          image: "{{ .Values.apiserver.image.repository }}:{{ .Values.apiserver.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          securityContext:
            {{- include "cloudai-fusion.containerSecurityContext" . | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.apiserver.service.port }}
              protocol: TCP
            - name: grpc
              containerPort: {{ .Values.apiserver.service.grpcPort | default 9090 }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.apiserver.service.metricsPort }}
              protocol: TCP
          env:
            - name: CLOUDAI_ENV
              value: "production"
            - name: CLOUDAI_LOG_LEVEL
              value: {{ .Values.apiserver.env.LOG_LEVEL | quote }}
            - name: CLOUDAI_DB_HOST
              value: {{ include "cloudai-fusion.postgresql.host" . | quote }}
            - name: CLOUDAI_DB_PORT
              value: "5432"
            - name: CLOUDAI_DB_NAME
              value: {{ .Values.postgresql.auth.database | quote }}
            - name: CLOUDAI_DB_USER
              value: {{ .Values.postgresql.auth.username | quote }}
            - name: CLOUDAI_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "cloudai-fusion.fullname" . }}-secrets
                  key: db-password
            - name: CLOUDAI_REDIS_ADDR
              value: {{ include "cloudai-fusion.redis.host" . | quote }}
            - name: CLOUDAI_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "cloudai-fusion.fullname" . }}-secrets
                  key: jwt-secret
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          resources:
            {{- toYaml .Values.apiserver.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cloudai-fusion.fullname" . }}-apiserver
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cloudai-fusion.labels" . | nindent 4 }}
    app.kubernetes.io/component: apiserver
spec:
  type: {{ .Values.apiserver.service.type }}
  ports:
    - port: {{ .Values.apiserver.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.apiserver.service.grpcPort | default 9090 }}
      targetPort: grpc
      protocol: TCP
      name: grpc
    - port: {{ .Values.apiserver.service.metricsPort }}
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    {{- include "cloudai-fusion.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: apiserver

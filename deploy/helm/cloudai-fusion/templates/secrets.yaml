{{- /*
  Secrets - Sensitive credentials (base64 encoded placeholder values)
  In production, use Sealed Secrets / External Secrets Operator / Vault
*/}}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cloudai-fusion.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cloudai-fusion.labels" . | nindent 4 }}
type: Opaque
stringData:
  db-host: {{ .Values.database.host | quote }}
  db-port: {{ .Values.database.port | default "5432" | quote }}
  db-name: {{ .Values.database.name | default "cloudai_fusion" | quote }}
  db-user: {{ .Values.database.user | default "cloudai" | quote }}
  db-password: {{ required "database.password is required — set via --set database.password=..." .Values.database.password | quote }}
  redis-addr: "{{ include "cloudai-fusion.fullname" . }}-redis-master:6379"
  redis-password: {{ .Values.redis.auth.password | default "" | quote }}
  jwt-secret: {{ required "auth.jwtSecret is required — set via --set auth.jwtSecret=..." .Values.auth.jwtSecret | quote }}
  {{- range .Values.cloudProviders }}
  {{ .name }}-access-key-id: {{ .accessKeyID | default "" | quote }}
  {{ .name }}-access-key-secret: {{ .accessKeySecret | default "" | quote }}
  {{- end }}
---
{{- /*
  ConfigMap - Non-sensitive configuration
*/}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cloudai-fusion.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cloudai-fusion.labels" . | nindent 4 }}
data:
  cloudai-fusion.yaml: |
    server:
      port: 8080
      mode: release
    scheduler:
      port: 8081
      enable_gpu_topology: true
      enable_preemption: true
      enable_gpu_sharing: true
    agent:
      port: 8082
      collect_interval: 15s
    ai_engine:
      url: http://{{ include "cloudai-fusion.fullname" . }}-ai-engine:8090
    monitoring:
      prometheus_port: 9090
      enable_tracing: true
      trace_sample_rate: 0.1
    mesh:
      mode: ambient
      enable_mtls: true

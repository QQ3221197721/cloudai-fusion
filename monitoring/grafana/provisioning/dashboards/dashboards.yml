# CloudAI Fusion - Grafana Dashboard Provisioning
apiVersion: 1

providers:
  - name: "CloudAI Fusion"
    orgId: 1
    folder: "CloudAI Fusion"
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false

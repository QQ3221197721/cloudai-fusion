# CloudAI Fusion - AI Scheduling Model Training Configuration
# Usage: python -m scheduler.train --config config/training.yaml

# General
experiment_name: "scheduling-optimizer-v1"
seed: 42
device: "cpu"  # cpu, cuda, cuda:0
output_dir: "../models"
log_level: "info"

# Environment (Gymnasium RL environment for scheduling simulation)
environment:
  name: "CloudSchedulingEnv-v1"
  max_steps: 1000
  num_nodes: 10
  num_gpus_per_node: 8
  gpu_types:
    - "nvidia-a100"
    - "nvidia-h100"
  workload_arrival_rate: 0.5  # Poisson arrival rate
  reward_weights:
    utilization: 0.35
    cost_efficiency: 0.25
    latency: 0.20
    fairness: 0.10
    topology_affinity: 0.10

# RL Algorithm (Stable-Baselines3)
algorithm:
  name: "PPO"  # PPO, A2C, SAC
  policy: "MlpPolicy"
  learning_rate: 0.0003
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5

# Training
training:
  total_timesteps: 500000
  eval_freq: 10000
  eval_episodes: 20
  save_freq: 50000
  log_interval: 10
  early_stopping:
    enabled: true
    patience: 5
    min_delta: 0.01

# Model Architecture
network:
  hidden_sizes: [256, 128, 64]
  activation: "relu"
  use_batch_norm: false
  dropout: 0.1

# Data
data:
  historical_metrics_path: ""  # Path to CSV/Parquet of historical scheduling data
  train_split: 0.8
  normalize: true

# Evaluation
evaluation:
  metrics:
    - "mean_reward"
    - "gpu_utilization"
    - "scheduling_latency_p95"
    - "cost_per_workload"
  baseline_comparison: true
  export_onnx: false

version: 2

# Automated dependency updates + security patches across every ecosystem the
# project uses. Dependabot opens PRs (which then run ci.yml + devsecops.yml),
# so vulnerable dependencies are surfaced and patched continuously.
updates:
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels: ["dependencies", "go"]
    groups:
      go-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: pip
    directory: "/ai"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels: ["dependencies", "python"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels: ["dependencies", "ci"]

  - package-ecosystem: docker
    directory: "/docker"
    schedule:
      interval: weekly
    labels: ["dependencies", "docker"]

name: Canary Release

on:
  workflow_dispatch:
    inputs:
      component:
        description: 'Component to canary deploy (apiserver, scheduler, agent, ai-engine)'
        required: true
        type: choice
        options:
          - apiserver
          - scheduler
          - agent
          - ai-engine
      canary_weight:
        description: 'Initial canary traffic percentage (1-50)'
        required: true
        default: '5'
      auto_promote:
        description: 'Auto-promote if metrics pass'
        required: true
        type: boolean
        default: true
      rollback_on_error:
        description: 'Auto-rollback on error threshold breach'
        required: true
        type: boolean
        default: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}
  NAMESPACE: cloudai-fusion
  METRICS_WINDOW: '300'       # 5 minutes observation window
  ERROR_THRESHOLD: '1'        # 1% error rate triggers rollback
  LATENCY_P99_THRESHOLD: '500' # 500ms P99 latency threshold
  PROMOTE_STEPS: '5,10,25,50,100' # Progressive traffic shift

permissions:
  contents: read
  packages: read
  id-token: write

jobs:
  # ============================================================================
  # Pre-flight Checks
  # ============================================================================
  preflight:
    name: Pre-flight Checks
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      current_image: ${{ steps.current.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Get current deployment image
        id: current
        run: |
          echo "image=$(kubectl get deploy ${{ inputs.component }} -n ${{ env.NAMESPACE }} -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || echo 'none')" >> $GITHUB_OUTPUT
        continue-on-error: true

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ inputs.component }}
          tags: type=sha

      - name: Run pre-flight tests
        run: |
          echo "=== Pre-flight Check ==="
          echo "Component:      ${{ inputs.component }}"
          echo "Canary weight:  ${{ inputs.canary_weight }}%"
          echo "Auto promote:   ${{ inputs.auto_promote }}"
          echo "Auto rollback:  ${{ inputs.rollback_on_error }}"
          echo "Image tag:      ${{ steps.meta.outputs.version }}"

  # ============================================================================
  # Deploy Canary
  # ============================================================================
  deploy-canary:
    name: Deploy Canary
    runs-on: ubuntu-latest
    needs: preflight
    steps:
      - uses: actions/checkout@v4

      - name: Deploy canary replica
        run: |
          cat <<EOF | kubectl apply -f -
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: ${{ inputs.component }}-canary
            namespace: ${{ env.NAMESPACE }}
            labels:
              app: ${{ inputs.component }}
              track: canary
              version: ${{ needs.preflight.outputs.image_tag }}
            annotations:
              cloudai-fusion.io/canary: "true"
              cloudai-fusion.io/canary-weight: "${{ inputs.canary_weight }}"
              cloudai-fusion.io/canary-started: "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: ${{ inputs.component }}
                track: canary
            template:
              metadata:
                labels:
                  app: ${{ inputs.component }}
                  track: canary
              spec:
                containers:
                  - name: ${{ inputs.component }}
                    image: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ inputs.component }}:${{ needs.preflight.outputs.image_tag }}
                    ports:
                      - containerPort: 8080
                    readinessProbe:
                      httpGet:
                        path: /healthz
                        port: 8080
                      initialDelaySeconds: 10
                      periodSeconds: 5
                    livenessProbe:
                      httpGet:
                        path: /healthz
                        port: 8080
                      initialDelaySeconds: 30
                      periodSeconds: 10
                    resources:
                      requests:
                        cpu: 500m
                        memory: 512Mi
                      limits:
                        cpu: 2000m
                        memory: 2Gi
          EOF

      - name: Wait for canary readiness
        run: |
          kubectl rollout status deployment/${{ inputs.component }}-canary \
            -n ${{ env.NAMESPACE }} --timeout=300s

      - name: Configure traffic split (Istio VirtualService)
        run: |
          cat <<EOF | kubectl apply -f -
          apiVersion: networking.istio.io/v1beta1
          kind: VirtualService
          metadata:
            name: ${{ inputs.component }}-canary-vs
            namespace: ${{ env.NAMESPACE }}
          spec:
            hosts:
              - ${{ inputs.component }}
            http:
              - route:
                  - destination:
                      host: ${{ inputs.component }}
                      subset: stable
                    weight: $(( 100 - ${{ inputs.canary_weight }} ))
                  - destination:
                      host: ${{ inputs.component }}
                      subset: canary
                    weight: ${{ inputs.canary_weight }}
          EOF

      - name: Configure DestinationRule
        run: |
          cat <<EOF | kubectl apply -f -
          apiVersion: networking.istio.io/v1beta1
          kind: DestinationRule
          metadata:
            name: ${{ inputs.component }}-canary-dr
            namespace: ${{ env.NAMESPACE }}
          spec:
            host: ${{ inputs.component }}
            subsets:
              - name: stable
                labels:
                  track: stable
              - name: canary
                labels:
                  track: canary
          EOF

  # ============================================================================
  # Monitor Canary Metrics
  # ============================================================================
  monitor-canary:
    name: Monitor Canary
    runs-on: ubuntu-latest
    needs: deploy-canary
    outputs:
      canary_healthy: ${{ steps.analyze.outputs.healthy }}
    steps:
      - name: Wait for metrics collection
        run: |
          echo "Observing canary for ${{ env.METRICS_WINDOW }} seconds..."
          sleep ${{ env.METRICS_WINDOW }}

      - name: Analyze canary metrics
        id: analyze
        run: |
          echo "=== Canary Metrics Analysis ==="

          # Query Prometheus for canary error rate
          CANARY_ERROR_RATE=$(curl -sf "http://prometheus:9090/api/v1/query" \
            --data-urlencode 'query=sum(rate(http_requests_total{track="canary",code=~"5.."}[5m])) / sum(rate(http_requests_total{track="canary"}[5m])) * 100' \
            | jq -r '.data.result[0].value[1] // "0"' 2>/dev/null || echo "0")

          STABLE_ERROR_RATE=$(curl -sf "http://prometheus:9090/api/v1/query" \
            --data-urlencode 'query=sum(rate(http_requests_total{track="stable",code=~"5.."}[5m])) / sum(rate(http_requests_total{track="stable"}[5m])) * 100' \
            | jq -r '.data.result[0].value[1] // "0"' 2>/dev/null || echo "0")

          # Query P99 latency
          CANARY_P99=$(curl -sf "http://prometheus:9090/api/v1/query" \
            --data-urlencode 'query=histogram_quantile(0.99, rate(http_request_duration_seconds_bucket{track="canary"}[5m]))' \
            | jq -r '.data.result[0].value[1] // "0"' 2>/dev/null || echo "0")

          echo "Canary error rate:  ${CANARY_ERROR_RATE}%"
          echo "Stable error rate:  ${STABLE_ERROR_RATE}%"
          echo "Canary P99 latency: ${CANARY_P99}ms"

          # Determine health
          HEALTHY="true"
          if (( $(echo "$CANARY_ERROR_RATE > ${{ env.ERROR_THRESHOLD }}" | bc -l 2>/dev/null || echo 0) )); then
            echo "::warning::Canary error rate exceeds threshold!"
            HEALTHY="false"
          fi

          echo "healthy=$HEALTHY" >> $GITHUB_OUTPUT
          echo "canary_error_rate=$CANARY_ERROR_RATE" >> $GITHUB_OUTPUT

  # ============================================================================
  # Progressive Promotion or Rollback
  # ============================================================================
  promote-or-rollback:
    name: Promote or Rollback
    runs-on: ubuntu-latest
    needs: monitor-canary
    steps:
      - uses: actions/checkout@v4

      - name: Promote canary to stable
        if: needs.monitor-canary.outputs.canary_healthy == 'true' && inputs.auto_promote
        run: |
          echo "=== Promoting Canary to Stable ==="
          # Update stable deployment with canary image
          kubectl set image deployment/${{ inputs.component }} \
            ${{ inputs.component }}=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ inputs.component }}:${{ needs.preflight.outputs.image_tag }} \
            -n ${{ env.NAMESPACE }}

          kubectl rollout status deployment/${{ inputs.component }} \
            -n ${{ env.NAMESPACE }} --timeout=300s

          # Clean up canary resources
          kubectl delete deployment ${{ inputs.component }}-canary -n ${{ env.NAMESPACE }} --ignore-not-found
          kubectl delete virtualservice ${{ inputs.component }}-canary-vs -n ${{ env.NAMESPACE }} --ignore-not-found
          kubectl delete destinationrule ${{ inputs.component }}-canary-dr -n ${{ env.NAMESPACE }} --ignore-not-found

          echo "Canary promoted successfully!"

      - name: Rollback canary
        if: needs.monitor-canary.outputs.canary_healthy != 'true' && inputs.rollback_on_error
        run: |
          echo "=== Rolling Back Canary ==="
          # Remove canary deployment
          kubectl delete deployment ${{ inputs.component }}-canary -n ${{ env.NAMESPACE }} --ignore-not-found

          # Restore 100% traffic to stable
          kubectl delete virtualservice ${{ inputs.component }}-canary-vs -n ${{ env.NAMESPACE }} --ignore-not-found
          kubectl delete destinationrule ${{ inputs.component }}-canary-dr -n ${{ env.NAMESPACE }} --ignore-not-found

          echo "::error::Canary rolled back due to unhealthy metrics"
          exit 1

      - name: Manual decision required
        if: needs.monitor-canary.outputs.canary_healthy != 'true' && !inputs.rollback_on_error
        run: |
          echo "::warning::Canary metrics are unhealthy but auto-rollback is disabled."
          echo "Manual intervention required."
          echo "To rollback: kubectl delete deploy ${{ inputs.component }}-canary -n ${{ env.NAMESPACE }}"
          echo "To promote:  re-run this workflow with auto_promote=true"

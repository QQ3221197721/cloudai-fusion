name: DevSecOps

# Security-focused pipeline complementing ci.yml (build/test/lint + Trivy fs).
# Adds SAST, dependency & container-config vuln scanning, secret scanning,
# CodeQL, SBOM generation and dependency review — the security gates expected
# of an enterprise DevSecOps program. Findings are uploaded to the GitHub
# Security tab (SARIF) so they are tracked and triaged, not just logged.

on:
  push:
    branches: [main, develop, 'release/*']
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '30 2 * * 1' # weekly, Monday 02:30 UTC
  workflow_dispatch: {}

permissions:
  contents: read
  security-events: write # upload SARIF to code scanning
  actions: read

env:
  GO_VERSION: '1.25'
  PYTHON_VERSION: '3.11'

jobs:
  # ---------------------------------------------------------------------------
  # SAST — Go static application security testing (gosec)
  # ---------------------------------------------------------------------------
  gosec:
    name: SAST (gosec)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run gosec
        uses: securego/gosec@master
        with:
          args: '-no-fail -fmt sarif -out gosec.sarif ./...'
      - name: Upload gosec SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: gosec.sarif
          category: gosec

  # ---------------------------------------------------------------------------
  # Go dependency vulnerability scan (govulncheck — reachability-aware)
  # ---------------------------------------------------------------------------
  govulncheck:
    name: Go Vulns (govulncheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...

  # ---------------------------------------------------------------------------
  # CodeQL — semantic code analysis (Go)
  # ---------------------------------------------------------------------------
  codeql:
    name: CodeQL (Go)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: go
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3
        with:
          category: '/language:go'

  # ---------------------------------------------------------------------------
  # Secret scanning (gitleaks) — full history on PR/push
  # ---------------------------------------------------------------------------
  gitleaks:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml

  # ---------------------------------------------------------------------------
  # Python dependency audit (pip-audit)
  # ---------------------------------------------------------------------------
  python-audit:
    name: Python Dep Audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: |
          pip install pip-audit
          pip-audit -r ai/requirements-ci.txt

  # ---------------------------------------------------------------------------
  # IaC / container-config scan (Trivy config) — Helm, Dockerfiles, k8s
  # ---------------------------------------------------------------------------
  iac-scan:
    name: IaC Scan (Trivy config)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: .
          format: sarif
          output: trivy-config.sarif
          severity: CRITICAL,HIGH
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-config.sarif
          category: trivy-config

  # ---------------------------------------------------------------------------
  # SBOM generation (Syft, SPDX) — supply-chain inventory
  # ---------------------------------------------------------------------------
  sbom:
    name: SBOM (Syft)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json

  # ---------------------------------------------------------------------------
  # Dependency review — block risky new deps on PRs
  # ---------------------------------------------------------------------------
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

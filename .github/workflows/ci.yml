name: CloudAI Fusion CI/CD

on:
  push:
    branches: [main, develop, 'release/*']
  pull_request:
    branches: [main, develop]
  release:
    types: [published]

env:
  GO_VERSION: '1.25'
  PYTHON_VERSION: '3.11'
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

permissions:
  contents: read
  packages: write
  security-events: write
  id-token: write # keyless cosign signing + SLSA provenance (Sigstore OIDC)

jobs:
  # ============================================================================
  # Go Backend - Lint, Test, Build
  # ============================================================================
  go-lint:
    name: Go Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.3
          args: --timeout=5m

  go-test:
    name: Go Test
    runs-on: ubuntu-latest
    needs: go-lint
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: cloudai_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run tests
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: cloudai_test
          DB_USER: test
          DB_PASSWORD: test
          REDIS_ADDR: localhost:6379
        run: |
          set -o pipefail
          go test -v -race -coverprofile=coverage.out ./pkg/... ./cmd/... 2>&1 | tee /tmp/gotest.log
          go tool cover -func=coverage.out | tail -1
      - name: Surface failing tests
        if: failure()
        run: |
          echo "::group::Go test tail (last 200 lines)"
          tail -n 200 /tmp/gotest.log || true
          echo "::endgroup::"
          # Failed packages / per-test FAIL / panics / races -> annotations (log needs auth).
          grep -E "^FAIL[[:space:]]|^--- FAIL:|[[:space:]]--- FAIL:|^panic:|WARNING: DATA RACE|test timed out" /tmp/gotest.log \
            | head -n 40 | sed -E 's/^[[:space:]]*/::error title=GoTest::/' || true
          # Source locations named in race/panic stacks (the actionable file:line).
          grep -oE "cloudai-fusion/[A-Za-z0-9_./-]+\.go:[0-9]+" /tmp/gotest.log \
            | sort -u | head -n 25 | sed -E 's#^#::error title=GoTestLoc::#' || true
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.out
          flags: go-backend

  go-build:
    name: Go Build
    runs-on: ubuntu-latest
    needs: go-test
    strategy:
      matrix:
        component: [apiserver, scheduler, agent]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build ${{ matrix.component }}
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -ldflags="-s -w -X main.version=${{ github.ref_name }} -X main.commit=${{ github.sha }}" \
            -o bin/${{ matrix.component }} \
            ./cmd/${{ matrix.component }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.component }}-binary
          path: bin/${{ matrix.component }}

  # ============================================================================
  # Python AI Engine - Lint, Test
  # ============================================================================
  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: |
          pip install ruff mypy
          cd ai
          ruff check .
          ruff format --check .

  python-test:
    name: Python Test
    runs-on: ubuntu-latest
    needs: python-lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: |
          pip install -r ai/requirements-ci.txt
          pip install pytest pytest-asyncio pytest-cov httpx
          cd ai
          python -m pytest tests/ -v --cov=agents --cov=anomaly --cov=scheduler --cov-report=xml:../coverage.xml --override-ini='addopts='
      - uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: python-ai

  # ============================================================================
  # Security Scanning
  # ============================================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # ============================================================================
  # Docker Images - Build & Push
  # ============================================================================
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [go-build, python-test]
    permissions:
      contents: read
      packages: write # push images to GHCR
      id-token: write # keyless cosign signing (Sigstore OIDC)
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    strategy:
      matrix:
        include:
          - component: apiserver
            dockerfile: docker/Dockerfile.apiserver
          - component: scheduler
            dockerfile: docker/Dockerfile.scheduler
          - component: agent
            dockerfile: docker/Dockerfile.agent
          - component: ai-engine
            dockerfile: docker/Dockerfile.ai
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.component }}
          tags: |
            type=sha
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - name: Build and push (with SLSA provenance + SBOM attestations)
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # BuildKit attaches an in-toto SLSA provenance attestation (mode=max:
          # includes build invocation, materials and steps) and an SBOM to the
          # image manifest in the registry — the "source of truth" for how the
          # artifact was built.
          provenance: mode=max
          sbom: true

      # ---- Supply chain: keyless cosign signature (Sigstore -> Fulcio -> Rekor) ----
      # GHCR/OCI repository names MUST be lowercase; github.repository can contain
      # uppercase (the owner login), which docker/metadata-action lowercases for the
      # push but the raw ${IMAGE_PREFIX} does not - so normalize once and reuse it for
      # every cosign/inspect reference below.
      - name: Normalize image name (GHCR requires lowercase)
        id: img
        run: echo "image=${IMAGE_RAW,,}" >> "$GITHUB_OUTPUT"
        env:
          IMAGE_RAW: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.component }}
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
      - name: Sign image by digest (keyless)
        env:
          IMAGE: ${{ steps.img.outputs.image }}
          DIGEST: ${{ steps.build.outputs.digest }}
          COSIGN_YES: "true"
        run: |
          cosign sign --yes "${IMAGE}@${DIGEST}"
          echo "::notice::Signed ${IMAGE}@${DIGEST} (keyless; recorded in the Rekor transparency log)"
      - name: Verify signature (self-check)
        env:
          IMAGE: ${{ steps.img.outputs.image }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign verify \
            --certificate-identity-regexp "^https://github.com/${{ github.repository }}/.github/workflows/.+" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${IMAGE}@${DIGEST}"
      - name: Inspect SLSA provenance attestation (self-check)
        env:
          IMAGE: ${{ steps.img.outputs.image }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          docker buildx imagetools inspect "${IMAGE}@${DIGEST}" \
            --format '{{ json .Provenance }}' | head -c 400 || true
      - name: Export image digest (for SLSA L3 provenance)
        run: |
          mkdir -p /tmp/digests
          echo "${{ steps.build.outputs.digest }}" > "/tmp/digests/${{ matrix.component }}.txt"
      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.component }}
          path: /tmp/digests/${{ matrix.component }}.txt
          retention-days: 1

  # ============================================================================
  # SLSA Level 3 provenance (trusted builder, non-falsifiable)
  # ============================================================================
  # The SLSA generator is a reusable workflow and cannot resolve digests itself,
  # so this job collects the per-component digests emitted by the matrix build
  # into a single JSON matrix that the generator job fans out over.
  slsa-matrix:
    name: SLSA Provenance Matrix
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    outputs:
      images: ${{ steps.collect.outputs.images }}
    steps:
      - name: Download digest artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: digest-*
          path: digests
          merge-multiple: true
      - name: Build image/digest matrix
        id: collect
        run: |
          items=""
          for f in digests/*.txt; do
            comp="$(basename "$f" .txt)"
            dig="$(tr -d '[:space:]' < "$f")"
            [ -z "$dig" ] && continue
            img="ghcr.io/${GITHUB_REPOSITORY,,}/$comp"
            item="{\"component\":\"$comp\",\"digest\":\"$dig\",\"image\":\"$img\"}"
            if [ -z "$items" ]; then items="$item"; else items="$items,$item"; fi
          done
          echo "images=[$items]" >> "$GITHUB_OUTPUT"

  # SLSA L3 provenance generation via the trusted reusable builder. It produces
  # a signed, non-falsifiable provenance attestation and pushes it to GHCR next
  # to each image (verify with: slsa-verifier verify-image / make verify-provenance).
  provenance:
    name: SLSA L3 Provenance
    needs: slsa-matrix
    if: needs.slsa-matrix.outputs.images != '[]'
    permissions:
      actions: read # read the workflow run for provenance
      id-token: write # keyless signing of the provenance
      packages: write # push the provenance to GHCR
    strategy:
      matrix:
        image: ${{ fromJSON(needs.slsa-matrix.outputs.images) }}
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.0.0
    with:
      image: ${{ matrix.image.image }}
      digest: ${{ matrix.image.digest }}
      registry-username: ${{ github.actor }}
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================================
  # Helm Chart - Lint & Package
  # ============================================================================
  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - run: helm lint deploy/helm/cloudai-fusion

  helm-publish:
    name: Helm Publish
    runs-on: ubuntu-latest
    needs: [helm-lint, docker-build]
    if: github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - run: |
          helm package deploy/helm/cloudai-fusion --version ${{ github.ref_name }}
          helm push "cloudai-fusion-${{ github.ref_name }}.tgz" "oci://${{ env.REGISTRY }}/${GITHUB_REPOSITORY,,}/charts"

  # ============================================================================
  # Integration Tests (on main only)
  # ============================================================================
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    env:
      # CI-only non-secret values so docker compose's required ${VAR:?} interpolations
      # resolve (the Cleanup step's `docker compose down` needs them too).
      CLOUDAI_DB_PASSWORD: ci-postgres-pw
      CLOUDAI_JWT_SECRET: ci-jwt-secret-not-for-production
    steps:
      - uses: actions/checkout@v4
      - name: Start core services
        # Only the core stack needed for the API smoke test (monitoring/ai-engine add
        # cold-build time). Poll apiserver from the host; on failure dump diagnostics
        # as annotations (CI job logs need auth to read).
        run: |
          set +e
          docker compose -f docker-compose.yml up -d --build postgres redis kafka nats apiserver
          up_rc=$?
          ok=0
          for i in $(seq 1 72); do
            if curl -sf http://localhost:8080/healthz >/dev/null 2>&1; then ok=1; echo "apiserver healthy after $((i*5))s"; break; fi
            sleep 5
          done
          if [ "$up_rc" != "0" ] || [ "$ok" != "1" ]; then
            echo "up_rc=$up_rc ok=$ok — dumping diagnostics"
            echo "::group::compose ps"; docker compose -f docker-compose.yml ps -a || true; echo "::endgroup::"
            for svc in apiserver kafka nats postgres redis; do
              echo "::group::$svc logs"; docker compose -f docker-compose.yml logs --tail=120 "$svc" || true; echo "::endgroup::"
            done
            docker compose -f docker-compose.yml ps -a 2>&1 | sed -E 's/^/::error title=ComposePS::/' || true
            for svc in apiserver kafka nats; do
              docker compose -f docker-compose.yml logs --tail=50 "$svc" 2>&1 | grep -iE "error|fatal|panic|refus|cannot|unable|unhealthy|failed|exited|dependency" | head -n 8 | sed -E "s/^/::error title=$svc::/" || true
            done
            exit 1
          fi
      - name: API smoke tests
        run: |
          # Login
          TOKEN=$(curl -sf -X POST http://localhost:8080/api/v1/auth/login \
            -H 'Content-Type: application/json' \
            -d '{"username":"admin","password":"admin123"}' | jq -r '.access_token')
          # List clusters
          curl -sf http://localhost:8080/api/v1/clusters \
            -H "Authorization: Bearer $TOKEN" | jq .
          # List providers
          curl -sf http://localhost:8080/api/v1/providers \
            -H "Authorization: Bearer $TOKEN" | jq .
      - name: Cleanup
        if: always()
        run: docker compose down -v
